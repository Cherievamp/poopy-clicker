name: Build Windows .exe

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe with PyInstaller
        run: pyinstaller --onefile --windowed --add-data "poopy_clicker/assets;assets" --hidden-import PyQt6.QtMultimedia --hidden-import PyQt6.QtMultimediaWidgets --collect-data poopy_clicker main.py --name PoopyClicker

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build installer with Inno Setup
        run: iscc setup.iss

      - name: Upload .exe to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/PoopyClicker.exe
          asset_name: PoopyClicker.exe
          tag: ${{ github.event.release.tag_name }}
          overwrite: true

      - name: Upload installer to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: installer/PoopyClicker_Setup.exe
          asset_name: PoopyClicker_Setup.exe
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
